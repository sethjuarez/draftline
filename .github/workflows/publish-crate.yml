name: Publish crate

on:
  workflow_dispatch:
    inputs:
      confirm_publish:
        description: "Type publish to publish the current draftline version to crates.io"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Test and publish draftline
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm publish intent
        run: |
          if [ "${{ inputs.confirm_publish }}" != "publish" ]; then
            echo "Refusing to publish without confirm_publish=publish"
            exit 1
          fi

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Test
        run: cargo test --workspace

      - name: Read crate metadata
        id: metadata
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import re
          from pathlib import Path

          manifest = Path("crates/draftline/Cargo.toml").read_text()
          name = re.search(r'^name\s*=\s*"([^"]+)"', manifest, re.MULTILINE).group(1)
          version = re.search(r'^version\s*=\s*"([^"]+)"', manifest, re.MULTILINE).group(1)

          print(f"name={name}")
          print(f"version={version}")
          PY

      - name: Check crates.io version
        id: crate
        env:
          CRATE_NAME: ${{ steps.metadata.outputs.name }}
          CRATE_VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          status=$(curl -sS -H "User-Agent: sethjuarez/draftline publish workflow (https://github.com/sethjuarez/draftline)" \
            -o /tmp/crate.json -w "%{http_code}" \
            "https://crates.io/api/v1/crates/${CRATE_NAME}/${CRATE_VERSION}")

          if [ "$status" = "200" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "${CRATE_NAME} ${CRATE_VERSION} is already published"
          elif [ "$status" = "404" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "${CRATE_NAME} ${CRATE_VERSION} is not published yet"
          else
            echo "Unexpected crates.io API status: $status"
            cat /tmp/crate.json
            exit 1
          fi

      - name: Publish to crates.io
        if: steps.crate.outputs.publish == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN secret is required to publish"
            exit 1
          fi

          cargo publish --manifest-path crates/draftline/Cargo.toml
